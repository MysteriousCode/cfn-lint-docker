name: Build docker image

on:
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch: ~

env:
  AWS_REGION : us-east-1
  ECR_REGISTRY: public.ecr.aws
  ECR_REPOSITORY: s4a2b7m4/cfn-lint
  DOCKERHUB_REPOSITORY: mysteriouscode/cfn-lint
  IAM_ROLE: arn:aws:iam::971283385982:role/public-cfn-lint-docker-repo-GithubRole-bxXOZEoTdfIq

permissions:
  id-token: write
  contents: read

jobs:
  BuildAndPush:
    runs-on: ubuntu-latest
    steps:
      - name: Find latest cfn-lint release
        id: fetch-latest-release
        uses: pozetroninc/github-action-get-latest-release@v0.8.0
        with:
          owner: aws-cloudformation
          repo: cfn-lint
          excludes: prerelease,draft
      - name: Check if image already exist
        id: check-exists
        env:
          IMAGE_TAG: ${{ steps.fetch-latest-release.outputs.release }}
        run: |
          set +e
          echo "Looking for $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker manifest inspect $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          if [ $? -eq 0 ]; then
            echo "Image exists"
            echo "continue_building=false" >> $GITHUB_OUTPUT
          else
            echo "Image does not exist"
            echo "continue_building=true" >> $GITHUB_OUTPUT
          fi
      - name: Checkout
        if: steps.check-exists.outputs.continue_building  == 'true'
        uses: actions/checkout@v7
      - name: Set up QEMU
        if: steps.check-exists.outputs.continue_building  == 'true'
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        if: steps.check-exists.outputs.continue_building  == 'true'
        uses: docker/setup-buildx-action@v3
      - name: Configure AWS credentials
        if: steps.check-exists.outputs.continue_building  == 'true'
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          role-to-assume: ${{ env.IAM_ROLE }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        if: steps.check-exists.outputs.continue_building  == 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public
      - name: Login to Docker Hub
        if: steps.check-exists.outputs.continue_building  == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push image
        if: steps.check-exists.outputs.continue_building  == 'true'
        shell: bash
        env:
          IMAGE_TAG: ${{ steps.fetch-latest-release.outputs.release }}
        run: |
          export MAJOR_VERSION="${IMAGE_TAG%%.*}"

          TAGS=(
            --tag "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
            --tag "$ECR_REGISTRY/$ECR_REPOSITORY:$MAJOR_VERSION"
            --tag "$DOCKERHUB_REPOSITORY:$IMAGE_TAG"
            --tag "$DOCKERHUB_REPOSITORY:$MAJOR_VERSION"
          )

          if [[ "$MAJOR_VERSION" == "v1" ]]
          then
              TAGS+=(--tag "$ECR_REGISTRY/$ECR_REPOSITORY:latest")
              TAGS+=(--tag "$DOCKERHUB_REPOSITORY:latest")
          fi

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg CFN_LINT_VERSION="$IMAGE_TAG" \
            "${TAGS[@]}" \
            --push \
            .

          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
